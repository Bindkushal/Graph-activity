<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd" [
  <!ENTITY stroke_color "#666666">
  <!ENTITY fill_color "#FFFFFF">
]>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
     width="55" height="55" viewBox="0 0 55 55">

  <!-- Background circle -->
  <circle cx="27.5" cy="27.5" r="25"
          fill="&fill_color;"
          stroke="&stroke_color;"
          stroke-width="3"/>

  <!-- X axis -->
  <line x1="8" y1="27.5" x2="47" y2="27.5"
        stroke="&stroke_color;" stroke-width="2"/>
  <!-- X axis arrow -->
  <polyline points="44,24 47,27.5 44,31"
            fill="none" stroke="&stroke_color;" stroke-width="2"/>

  <!-- Y axis -->
  <line x1="27.5" y1="8" x2="27.5" y2="47"
        stroke="&stroke_color;" stroke-width="2"/>
  <!-- Y axis arrow -->
  <polyline points="24,11 27.5,8 31,11"
            fill="none" stroke="&stroke_color;" stroke-width="2"/>

  <!-- Grid dots (subtle) -->
  <circle cx="20" cy="20" r="1" fill="&stroke_color;" opacity="0.4"/>
  <circle cx="35" cy="20" r="1" fill="&stroke_color;" opacity="0.4"/>
  <circle cx="20" cy="35" r="1" fill="&stroke_color;" opacity="0.4"/>
  <circle cx="35" cy="35" r="1" fill="&stroke_color;" opacity="0.4"/>

  <!-- Plotted points with connecting line -->
  <polyline points="14,36 20,20 35,20 27.5,32 41,36"
            fill="none" stroke="&stroke_color;" stroke-width="1.8"
            stroke-dasharray="0" opacity="0.7"/>

  <!-- Highlight dots on the line -->
  <circle cx="14" cy="36" r="2.5" fill="&stroke_color;"/>
  <circle cx="20" cy="20" r="2.5" fill="&stroke_color;"/>
  <circle cx="35" cy="20" r="2.5" fill="&stroke_color;"/>
  <circle cx="27.5" cy="32" r="2.5" fill="&stroke_color;"/>
  <circle cx="41" cy="36" r="2.5" fill="&stroke_color;"/>

</svg>